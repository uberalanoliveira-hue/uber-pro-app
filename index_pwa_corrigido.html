<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Controle Uber PRO</title>
<style>
:root {
  color-scheme: dark;
  --bg:#0f172a;
  --card:#111827;
  --line:#2b3648;
  --text:#f8fafc;
  --muted:#94a3b8;
  --blue:#2563eb;
  --green:#16a34a;
  --gray:#334155;
  --red:#dc2626;
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:Arial,Helvetica,sans-serif; }
body {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}
.card {
  width:min(390px,100%);
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px;
}
h1 {
  margin:0 0 8px 0;
  font-size:24px;
}
.subtle {
  color:var(--muted);
  font-size:13px;
  line-height:1.4;
  margin-bottom:10px;
}
.tabs {
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.tab {
  flex:1;
  border:1px solid var(--line);
  background:#0b1220;
  color:var(--text);
  border-radius:12px;
  padding:10px;
  font:inherit;
  font-weight:700;
}
.tab.active {
  background:rgba(37,99,235,.22);
  border-color:#3b82f6;
}
input {
  width:100%;
  padding:12px 14px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#08111f;
  color:var(--text);
  font-size:14px;
  outline:none;
}
.row {
  display:flex;
  gap:10px;
  margin-top:12px;
}
.row>* { flex:1; }
button.action {
  width:100%;
  padding:12px 14px;
  border:none;
  border-radius:12px;
  font:inherit;
  font-weight:700;
  color:#fff;
}
.primary { background:var(--green); }
.secondary { background:var(--gray); }
#msg {
  margin-top:12px;
  padding:10px 12px;
  border-radius:12px;
  display:none;
  border:1px solid var(--line);
  background:rgba(255,255,255,.06);
  font-size:13px;
  line-height:1.4;
}
.ok {
  border-color:rgba(22,163,74,.55) !important;
  background:rgba(22,163,74,.12) !important;
}
.danger {
  border-color:rgba(220,38,38,.55) !important;
  background:rgba(220,38,38,.12) !important;
}
.hidden { display:none !important; }
.small {
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
}
.badge {
  position:fixed;
  top:10px;
  left:10px;
  background:rgba(0,0,0,.35);
  border:1px solid var(--line);
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div class="badge">LOGIN 51</div>

<div class="card">
  <h1>Controle Uber PRO</h1>
  <div class="subtle" id="subtitle">Entre para acessar.</div>

  <div class="tabs">
    <button class="tab active" id="tabLogin" type="button">Entrar</button>
    <button class="tab" id="tabSignup" type="button">Criar conta</button>
  </div>

  <input id="name" class="hidden" type="text" placeholder="Nome completo" autocomplete="name">
  <input id="email" type="email" placeholder="Email" autocomplete="email">
  <input id="pass" type="password" placeholder="Senha" autocomplete="current-password">

  <div class="row">
    <button class="action primary" id="primaryBtn" type="button">Entrar</button>
    <button class="action secondary" id="forgotBtn" type="button">Esqueci</button>
  </div>

  <div id="msg"></div>
  <div class="small">Status: <span id="status">pronto</span></div>
</div>

<script>
(function(){
  var SUPABASE_URL = 'https://xoqlgwjpmdkiazwpwhmn.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvcWxnd2pwbWRraWF6d3B3aG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NjY1OTksImV4cCI6MjA4NzU0MjU5OX0.txohC3MvvEDaCCVRouVPDrmVaAO1PJxY0LawUttj9PA';
  var PANEL_PAGE = "painel.html";
  var REDIRECT_URL = 'https://uberalanoliveira-hue.github.io/uber-pro-app/reset.html';
  var mode = "login";

  function $(id) { return document.getElementById(id); }
  function setStatus(t) { $("status").textContent = t; }
  function showMsg(text, kind) {
    var el = $("msg");
    el.style.display = "block";
    el.className = "";
    if (kind) el.classList.add(kind);
    el.textContent = text;
  }
  function hideMsg() {
    var el = $("msg");
    el.style.display = "none";
    el.className = "";
    el.textContent = "";
  }
  function setMode(next) {
    mode = next === "signup" ? "signup" : "login";
    $("tabLogin").classList.toggle("active", mode === "login");
    $("tabSignup").classList.toggle("active", mode === "signup");
    $("primaryBtn").textContent = mode === "login" ? "Entrar" : "Criar conta";
    $("subtitle").textContent = mode === "login" ? "Entre para acessar." : "Crie sua conta.";
    $("name").classList.toggle("hidden", mode !== "signup");
    hideMsg();
    setStatus("modo: " + mode);
  }
  function saveSession(data) {
    try {
      localStorage.setItem("sb_token", data.access_token || "");
      localStorage.setItem("sb_refresh_token", data.refresh_token || "");
      localStorage.setItem("sb_expires_at", String(data.expires_at || 0));
    } catch(e) {}
  }
  function clearSession() {
    try {
      localStorage.removeItem("sb_token");
      localStorage.removeItem("sb_refresh_token");
      localStorage.removeItem("sb_expires_at");
    } catch(e) {}
  }
  function hasToken() {
    try { return !!(localStorage.getItem("sb_token") || ""); }
    catch(e) { return false; }
  }
  async function api(path, method, body, token, extraHeaders) {
    var headers = {
      "apikey": SUPABASE_KEY,
      "Content-Type": "application/json",
      "Authorization": "Bearer " + (token || SUPABASE_KEY)
    };
    if (extraHeaders) {
      for (var k in extraHeaders) headers[k] = extraHeaders[k];
    }
    var res = await fetch(SUPABASE_URL + path, {
      method: method,
      headers: headers,
      body: body ? JSON.stringify(body) : undefined
    });
    var text = await res.text();
    var data = null;
    try { data = text ? JSON.parse(text) : null; }
    catch(e) { data = { raw:text }; }
    if (!res.ok) {
      throw new Error((data && (data.msg || data.message || data.error_description || data.error)) || ("HTTP " + res.status));
    }
    return data;
  }
  function addDaysISO(days) {
    var d = new Date();
    d.setDate(d.getDate() + days);
    return d.toISOString();
  }
  function isExpired(iso) {
    if (!iso) return false;
    var t = new Date(iso).getTime();
    return isFinite(t) ? (Date.now() > t) : false;
  }
  function getUser(token) {
    return api("/auth/v1/user", "GET", null, token);
  }
  function getAccess(userId, token) {
    return api("/rest/v1/user_access?select=*&user_id=eq." + encodeURIComponent(userId), "GET", null, token, {"Accept":"application/json"})
      .then(function(rows) {
        return (Array.isArray(rows) && rows.length) ? rows[0] : null;
      });
  }
  function createAccess(userId, token, nome, email) {
    var payload = {
      user_id: userId,
      nome: nome || null,
      email: email || null,
      trial_start: new Date().toISOString(),
      trial_end: addDaysISO(7),
      status: "trial"
    };
    return api("/rest/v1/user_access", "POST", payload, token, {"Prefer":"return=representation","Accept":"application/json"})
      .then(function(rows) {
        return (Array.isArray(rows) && rows.length) ? rows[0] : payload;
      });
  }
  function updateAccess(userId, token, patch) {
    return api("/rest/v1/user_access?user_id=eq." + encodeURIComponent(userId), "PATCH", patch, token, {"Prefer":"return=representation","Accept":"application/json"});
  }
  async function validateAndGo(session) {
    var user = await getUser(session.access_token);
    var access = await getAccess(user.id, session.access_token);
    if (!access) {
      access = await createAccess(user.id, session.access_token, user.user_metadata && user.user_metadata.nome, user.email);
    }
    if (access.status === "blocked") {
      showMsg("Seu acesso expirou. Entre em contato para renovar.", "danger");
      setStatus("bloqueado");
      return;
    }
    if (access.status === "trial" && access.trial_end && isExpired(access.trial_end)) {
      await updateAccess(user.id, session.access_token, { status: "blocked" });
      showMsg("Seu teste de 7 dias expirou. Entre em contato para renovar.", "danger");
      setStatus("bloqueado");
      return;
    }
    location.href = PANEL_PAGE;
  }
  async function primaryAction() {
    hideMsg();
    var nome = $("name").value.trim();
    var email = $("email").value.trim();
    var pass = $("pass").value.trim();

    if (!email || !pass) {
      showMsg("Preencha email e senha.", "danger");
      setStatus("faltam dados");
      return;
    }

    if (mode === "signup") {
      if (!nome) {
        showMsg("Preencha o nome completo.", "danger");
        setStatus("faltam dados");
        return;
      }
      setStatus("criando conta");
      try {
        const data = await api("/auth/v1/signup?redirect_to=" + encodeURIComponent(REDIRECT_URL), "POST", {
          email: email,
          password: pass,
          data: { nome: nome }
        }, null);
        if (data.user) {
          showMsg("Conta criada. Verifique seu email para confirmar.", "ok");
          setStatus("conta criada");
        } else {
          showMsg("Erro no cadastro.", "danger");
          setStatus("erro");
        }
      } catch(e) {
        showMsg(e.message || "Erro no cadastro.", "danger");
        setStatus("erro");
      }
      return;
    }

    setStatus("entrando");
    try {
      const data = await api("/auth/v1/token?grant_type=password", "POST", {
        email: email,
        password: pass
      }, null);
      if (data.access_token) {
        saveSession(data);
        await validateAndGo(data);
      } else {
        showMsg("Erro no login.", "danger");
        setStatus("erro");
      }
    } catch(e) {
      showMsg(e.message || "Erro no login.", "danger");
      setStatus("erro");
    }
  }
  async function forgot() {
    hideMsg();
    var email = $("email").value.trim();
    if (!email) {
      showMsg("Digite seu email.", "danger");
      setStatus("faltam dados");
      return;
    }
    setStatus("enviando");
    try {
      await api("/auth/v1/recover?redirect_to=" + encodeURIComponent(REDIRECT_URL), "POST", { email: email }, null);
      showMsg("Email enviado.", "ok");
      setStatus("OK");
    } catch(e) {
      var m = (e.message || "");
      if (m.toLowerCase().includes("rate")) {
        showMsg("Muitas tentativas de email. Aguarde e tente novamente.", "danger");
      } else {
        showMsg(m || "Erro ao enviar email.", "danger");
      }
      setStatus("erro");
    }
  }

  $("tabLogin").addEventListener("click", function() { setMode("login"); }, true);
  $("tabSignup").addEventListener("click", function() { setMode("signup"); }, true);
  $("primaryBtn").addEventListener("click", primaryAction, true);
  $("forgotBtn").addEventListener("click", forgot, true);

  setMode("login");
  if (hasToken()) {
    validateAndGo({ access_token: localStorage.getItem("sb_token") || "" })
      .catch(function() {
        clearSession();
        setStatus("pronto");
      });
  }
})();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(console.error);
  });
}
</script>
</body>
</html>
