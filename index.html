<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MetaDriver v90</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#0f172a 0%, #111827 100%);font-family:Arial,Helvetica,sans-serif;color:#fff;padding:20px}
.wrap{width:min(420px,100%);text-align:center}
.logo-img{width:120px;height:120px;object-fit:contain;border-radius:28px;margin:0 auto 18px;display:block;box-shadow:0 10px 28px rgba(0,0,0,.30)}
.title{font-size:28px;font-weight:800;margin-bottom:10px}
.sub{opacity:.86;line-height:1.45;margin-bottom:18px;font-size:14px}
button{width:100%;padding:14px 16px;border:none;border-radius:14px;font:inherit;font-weight:700}
#installBtn{background:#22c55e;color:#0b1220}
#openLoginBtn{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.14);margin-top:10px}
.note{margin-top:12px;font-size:12px;opacity:.8;line-height:1.4}
.install-helper{margin-top:12px;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);font-size:12px;line-height:1.45;display:none}
.install-helper.show{display:block}
.install-actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px}
.install-actions button{margin-top:0;padding:12px 14px}
.hidden{display:none !important}
.splash .logo-img{animation:pulse 1.1s ease-in-out infinite alternate}
.splash .sub{margin-bottom:0}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.035)}}
.version-debug-badge{position:fixed;right:10px;bottom:10px;z-index:2147483647;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(15,23,42,.88);color:#fff;font-size:11px;font-weight:700;letter-spacing:.2px;opacity:.95}
</style>
</head>
<body>
<div class="wrap splash" id="bootWrap">
  <img class="logo-img" src="icon-512.png" alt="Logo MetaDriver">
  <div class="title">MetaDriver</div>
  <div class="sub" id="subText">Abrindo aplicativo...</div>
</div>

<div class="wrap hidden" id="installWrap">
  <img class="logo-img" src="icon-512.png" alt="Logo MetaDriver">
  <div class="title">MetaDriver</div>
  <div class="sub" id="installSubText">Instale o aplicativo para usar da forma correta.</div>
  <button id="installBtn" type="button">Instalar aplicativo</button>
    <div class="note" id="noteText">Use o Chrome para instalar o aplicativo.</div>
  <div class="install-helper" id="installHelper">
    <div id="installHelperText">Instalação automática indisponível neste momento.</div>
    <div class="install-actions">
      <button id="showStepsBtn" type="button">Como instalar</button>
    </div>
  </div>
</div>

<div class="version-debug-badge">MetaDriver v90 · boot</div>

<script>
(function(){
  var deferredPrompt = null;
  var bootWrap = document.getElementById('bootWrap');
  var installWrap = document.getElementById('installWrap');
  var subText = document.getElementById('subText');
  var installSubText = document.getElementById('installSubText');
  var noteText = document.getElementById('noteText');
  var installHelper = document.getElementById('installHelper');
  var installHelperText = document.getElementById('installHelperText');

  function isIOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent); }
  function isSafari(){ return /^((?!chrome|android).)*safari/i.test(navigator.userAgent); }
  function isStandalone(){ return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true; }
  function hasSavedSession(){
    try{
      return !!(localStorage.getItem('sb_token') || localStorage.getItem('sb_refresh_token') || localStorage.getItem('supabase.auth.token'));
    }catch(e){ return false; }
  }
  function go(url){ window.location.replace(url); }
  function showInstall(){
    bootWrap.classList.add('hidden');
    installWrap.classList.remove('hidden');
  }
  function showHelper(message){
    if(message) installHelperText.textContent = message;
    installHelper.classList.add('show');
  }
  function showManualSteps(){
    var steps = (isIOS() && isSafari())
      ? 'No iPhone: Compartilhar → Adicionar à Tela de Início. Depois abra o ícone instalado.'
      : 'No Chrome Android: menu ⋮ → Instalar aplicativo ou Adicionar à tela inicial.';
    alert(steps);
  }

  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
  });

  window.addEventListener('appinstalled', function(){
    deferredPrompt = null;
    try{
      installSubText.textContent = 'Aplicativo instalado com sucesso. Abra o app instalado para entrar.';
      noteText.textContent = 'Depois de instalar, use o ícone do MetaDriver na tela inicial.';
      document.getElementById('installBtn').style.display = 'none';
    }catch(e){}
  });

  document.getElementById('installBtn').addEventListener('click', async function(){
    if (deferredPrompt) {
      deferredPrompt.prompt();
      try { await deferredPrompt.userChoice; } catch(e) {}
      return;
    }
    if (isIOS() && isSafari()) {
      installSubText.textContent = 'No iPhone, instale pelo menu Compartilhar do Safari e depois “Adicionar à Tela de Início”.';
      noteText.textContent = 'No Safari o botão de instalar não abre o prompt automático.';
      showHelper('No iPhone/Safari a instalação é manual pelo menu Compartilhar.');
      return;
    }
    showHelper('Instalação automática indisponível neste momento.');
  }, true);

  document.getElementById('showStepsBtn').addEventListener('click', showManualSteps, true);

  // Fluxo correto:
  // - app instalado: abre direto no app se houver sessão; senão vai pro login
  // - navegador comum: mostra tela de instalação
  if (isStandalone()) {
    subText.textContent = 'Verificando sessão...';
    setTimeout(function(){
      go(hasSavedSession() ? 'app30_app.html' : 'login.html');
    }, 20);
    return;
  }

  showInstall();
})();
</script>
</body>
</html>
